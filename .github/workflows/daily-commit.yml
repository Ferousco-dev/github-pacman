name: Daily Auto Commit

on:
  schedule:
    # Runs once a day at 12:00 UTC
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make 1-3 commits
        run: |
          git config user.name "Ferousco-dev"
          git config user.email "247435076+Ferousco-dev@users.noreply.github.com"

          # Random number of commits between 1 and 3
          COUNT=$(( (RANDOM % 3) + 1 ))
          echo "Making $COUNT commit(s) today"

          for i in $(seq 1 "$COUNT"); do
            echo "$(date -u '+%Y-%m-%dT%H:%M:%SZ') - activity $i" >> activity.log
            git add activity.log
            git commit -m "chore: daily activity ($i/$COUNT)"
            sleep 2
          done

      - name: Push changes
        run: git push
